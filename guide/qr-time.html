<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码时间刷新 - 工具导航网站</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://at.alicdn.com/t/font_8d5l8fzk5b87iudi.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

<body class="qr-time-page">
    <header>
        <div class="logo-container">
            <img src="logo.png" alt="工具导航" class="logo">
            <h1>实用工具导航</h1>
        </div>
 
    </header>

    <main>
        <div class="qr-access-modal" id="qr-access-section" role="dialog" aria-modal="true" aria-label="权限验证">
            <div class="qr-access-dialog">
                <form id="qr-access-form">
                    <label class="qr-access-sentence" for="qr-access-answer">
                        <span>我是你的</span>
                        <input type="text" id="qr-access-answer" autocomplete="off" placeholder="" required>
                    </label>
                    <div id="qr-access-status" class="status-message" aria-live="polite"></div>
                    <button type="submit" class="btn">确认</button>
                </form>
            </div>
        </div>

        <section class="tool-form qr-protected-tool" id="qr-tool-section" hidden>
            <div class="form-group qr-upload-card">
                <label for="qr-image-input">上传二维码图片</label>
                <input type="file" id="qr-image-input" accept="image/*">
            </div>

            <div id="qr-status" class="status-message"></div>

            <div class="qr-panel qr-output-panel">
                <h3>新二维码</h3>
                <div id="qr-output" class="qr-output"></div>
                <div id="qr-expire-time" class="qr-expire-time"></div>
                <button type="button" class="btn qr-refresh-btn" id="qr-refresh-btn" disabled>刷新</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 工具导航网站 - 收集实用在线工具</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="app.js"></script>

    <script>
        var _hmt = _hmt || [];
        (function () {
            var hm = document.createElement("script");
            hm.src = "https://hm.baidu.com/hm.js?998d506c8dbe374b28de5393123c89b0";
            var s = document.getElementsByTagName("script")[0];
            s.parentNode.insertBefore(hm, s);
        })();
    </script>

</body>

</html>
